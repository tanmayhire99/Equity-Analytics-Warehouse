# Minimal Airflow (LocalExecutor) that orchestrates the equity pipeline.
# It connects to the EXISTING warehouse Postgres (the `equity-pg` container
# published on host port 5433) via host.docker.internal, so the DAG operates on
# the same data the pipeline already populated.
#
#   docker compose -f airflow/docker-compose.yaml up -d --build
#   open http://localhost:8080   (admin / admin)
---
x-airflow-common: &airflow-common
  build: .
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    PYTHONPATH: /opt/airflow/project
    # Warehouse connection (the equity-pg container on the host).
    DB_TARGET: local
    DATABASE_URL: postgresql://equity_user:equity_pass@host.docker.internal:5433/equity_db
    # Project root is a read-only mount point here, so cache to a writable path.
    JUGAAD_CACHE_DIR: /tmp/jugaad-cache
  volumes:
    - ./dags:/opt/airflow/dags
    - ../config:/opt/airflow/project/config
    - ../db:/opt/airflow/project/db
    - ../pipeline:/opt/airflow/project/pipeline
    - ../consumer_api.py:/opt/airflow/project/consumer_api.py
    - airflow-logs:/opt/airflow/logs
  extra_hosts:
    - "host.docker.internal:host-gateway"
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: always

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --password admin
        --firstname Admin --lastname User --role Admin --email admin@example.com || true
    restart: on-failure

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully

volumes:
  airflow-logs:
